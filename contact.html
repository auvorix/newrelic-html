<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f4f4f4; color: #333; }
    .header { background: #1a1a2e; color: #fff; padding: 20px 40px; }
    .header h1 { font-size: 24px; }
    .nav { background: #16213e; padding: 10px 40px; }
    .nav a { color: #e0e0e0; text-decoration: none; margin-right: 20px; font-size: 15px; }
    .nav a:hover, .nav a.active { color: #0f9b8e; }
    .content { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    .content h2 { font-size: 28px; margin-bottom: 16px; }
    .content p { line-height: 1.7; margin-bottom: 12px; color: #555; }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 24px; margin-bottom: 20px; }
    label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 14px; }
    input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; margin-bottom: 16px; }
    button { background: #0f9b8e; color: #fff; border: none; padding: 12px 28px; border-radius: 4px; cursor: pointer; font-size: 15px; }
    button:hover { background: #0c7a6f; }
    .footer { background: #1a1a2e; color: #aaa; text-align: center; padding: 20px; margin-top: 60px; font-size: 13px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>NR Test — Basic HTML</h1>
  </div>

  <div class="nav">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html" class="active">Contact</a>
  </div>

  <div class="content">
    <h2>Contact</h2>
    <p>This form is static — it does not submit anywhere. It exists to generate user interaction events for New Relic to track.</p>

    <div class="card">
      <label for="name">Name</label>
      <input type="text" id="name" placeholder="Your name">

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="your@email.com">

      <label for="message">Message</label>
      <textarea id="message" rows="5" placeholder="Your message..."></textarea>

      <button type="button" onclick="alert('Form is static — for testing only')">Send Message</button>
    </div>
  </div>

  <div class="footer">
    &copy; 2026 NR Test HTML — New Relic monitoring test site
